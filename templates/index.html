<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ErBot Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- TradingView Lightweight Charts Kütüphanesi -->
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0b0e11',
                        darkPanel: '#181a20',
                        accent: '#fcd535',
                        up: '#0ecb81',
                        down: '#f6465d'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0b0e11; color: #eaecef; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .tv-chart { width: 100%; height: 500px; }
        /* Özel scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0b0e11; }
        ::-webkit-scrollbar-thumb { background: #2b3139; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #474d57; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Üst Bilgi Paneli -->
    <header class="bg-darkPanel border-b border-gray-800 p-4 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-accent">ErBot Terminal v3.8</h1>
            <span id="last-update" class="text-xs text-gray-500">Son Güncelleme: Bekleniyor...</span>
        </div>
        <div class="flex gap-6">
            <div class="bg-darkBg px-4 py-2 rounded-lg border border-gray-800">
                <span class="text-xs text-gray-400 block">Cüzdan Bakiyesi</span>
                <span id="balance" class="font-mono text-lg font-bold">0.00 USDT</span>
            </div>
            <div class="bg-darkBg px-4 py-2 rounded-lg border border-gray-800 flex flex-col min-w-[200px]">
                <span class="text-xs text-gray-400 block">Açık Pozisyon</span>
                <div id="position-info" class="font-mono text-sm mt-1">
                    <span class="text-gray-500">Pozisyon Yok</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Ana İçerik -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Sol Panel: İndikatörler ve Skor Tablosu -->
        <aside class="w-[450px] bg-darkPanel border-r border-gray-800 flex flex-col shrink-0">
            <div class="p-3 border-b border-gray-800 flex justify-between items-center">
                <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider">Piyasa Taraması</h2>
                <span class="text-xs bg-gray-800 px-2 py-1 rounded text-gray-400">Canlı</span>
            </div>
            <div class="flex-1 overflow-y-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="sticky top-0 bg-darkBg text-xs text-gray-400 uppercase">
                        <tr>
                            <th class="py-3 px-4 font-medium">Sembol</th>
                            <th class="py-3 px-4 font-medium">Skor</th>
                            <th class="py-3 px-4 font-medium text-right">Sinyal</th>
                            <th class="py-3 px-4 font-medium">Detay</th>
                        </tr>
                    </thead>
                    <tbody id="scan-table" class="divide-y divide-gray-800/50">
                        <tr><td colspan="4" class="text-center py-8 text-gray-500">Veri Bekleniyor...</td></tr>
                    </tbody>
                </table>
            </div>
        </aside>

        <!-- Sağ Panel: Grafik ve Seçili Sembol Analizi -->
        <section class="flex-1 flex flex-col bg-darkBg relative">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-darkPanel shrink-0">
                <div class="flex items-center gap-3">
                    <h2 id="chart-title" class="text-2xl font-bold">BTC/USDT</h2>
                    <span class="text-xs text-gray-400 bg-gray-800 px-2 py-1 rounded">5m</span>
                </div>
                <div id="current-price" class="text-2xl font-mono font-medium">0.00</div>
            </div>
            
            <!-- TradingView Grafiği -->
            <div id="tv-chart" class="tv-chart flex-1 relative z-0"></div>
            
            <!-- Seçili Coin İndikatör Özeti (Grafiğin altında) -->
            <div class="h-32 bg-darkPanel border-t border-gray-800 p-4 shrink-0 grid grid-cols-5 gap-4">
                <div>
                    <span class="text-xs text-gray-500 block mb-1">ADX (Trend Gücü)</span>
                    <span id="ind-adx" class="font-mono text-lg font-medium">-</span>
                </div>
                <div>
                    <span class="text-xs text-gray-500 block mb-1">RSI</span>
                    <span id="ind-rsi" class="font-mono text-lg font-medium">-</span>
                </div>
                <div>
                    <span class="text-xs text-gray-500 block mb-1">StochRSI (K/D)</span>
                    <span id="ind-stoch" class="font-mono text-lg font-medium">-</span>
                </div>
                <div>
                    <span class="text-xs text-gray-500 block mb-1">MACD Yönü</span>
                    <span id="ind-macd" class="font-mono text-lg font-medium">-</span>
                </div>
                <div>
                    <span class="text-xs text-gray-500 block mb-1">EMA21 Durumu</span>
                    <span id="ind-ema" class="font-mono text-lg font-medium">-</span>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Global Durum
        let currentSymbol = 'BTC/USDT';
        let chart = null;
        let candleSeries = null;
        let botState = null;

        // Grafik Başlatma (Lightweight Charts)
        function initChart() {
            const chartContainer = document.getElementById('tv-chart');
            chart = LightweightCharts.createChart(chartContainer, {
                layout: { background: { type: 'solid', color: '#0b0e11' }, textColor: '#848e9c' },
                grid: { vertLines: { color: '#2b3139' }, horzLines: { color: '#2b3139' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                rightPriceScale: { borderColor: '#2b3139' },
                timeScale: { borderColor: '#2b3139', timeVisible: true }
            });
            candleSeries = chart.addCandlestickSeries({
                upColor: '#0ecb81', downColor: '#f6465d', borderVisible: false,
                wickUpColor: '#0ecb81', wickDownColor: '#f6465d'
            });

            // Ekrana duyarlı boyutlandırma
            new ResizeObserver(entries => {
                if (entries.length === 0 || entries[0].target !== chartContainer) return;
                const newRect = entries[0].contentRect;
                chart.applyOptions({ height: newRect.height, width: newRect.width });
            }).observe(chartContainer);
        }

        // Grafik Verisini Çekme
        async function loadChartData(symbol) {
            document.getElementById('chart-title').textContent = symbol;
            try {
                const response = await fetch(`/api/klines?symbol=${symbol.replace('/', '%2F')}`);
                const data = await response.json();
                if (!data.error) {
                    candleSeries.setData(data);
                    document.getElementById('current-price').textContent = data[data.length-1].close.toFixed(4);
                    
                    // Renk ayarlama (fiyat arttı mı düştü mü)
                    const isUp = data[data.length-1].close >= data[data.length-1].open;
                    document.getElementById('current-price').className = `text-2xl font-mono font-medium ${isUp ? 'text-up' : 'text-down'}`;
                }
            } catch (err) { console.error("Grafik yüklenemedi:", err); }
        }

        // Tablodan Coin Seçimi
        window.selectSymbol = function(symbol) {
            if (currentSymbol === symbol) return;
            currentSymbol = symbol;
            loadChartData(symbol);
            updateIndicatorPanel(symbol);
        };

        // İndikatör Panelini Güncelle
        function updateIndicatorPanel(symbol) {
            if (!botState || !botState.tarama) return;
            const item = botState.tarama.find(s => s.sembol === symbol);
            if (!item) return;

            document.getElementById('ind-adx').textContent = item.adx.toFixed(1);
            document.getElementById('ind-rsi').textContent = item.rsi.toFixed(1);
            
            const stochK = (item.stoch_k * 100).toFixed(1);
            const stochD = (item.stoch_d * 100).toFixed(1);
            document.getElementById('ind-stoch').innerHTML = `<span class="text-white">${stochK}%</span> / <span class="text-gray-500">${stochD}%</span>`;
            
            const macdCol = item.macd_dir.includes('YUKARI') ? 'text-up' : (item.macd_dir.includes('ASAGI') ? 'text-down' : 'text-gray-400');
            document.getElementById('ind-macd').innerHTML = `<span class="${macdCol}">${item.macd_dir}</span>`;
            
            const emaStatus = item.fiyat > item.ema21 ? 'Üstünde' : 'Altında';
            const emaCol = item.fiyat > item.ema21 ? 'text-up' : 'text-down';
            document.getElementById('ind-ema').innerHTML = `<span class="${emaCol}">${emaStatus}</span> <span class="text-gray-500 text-sm">(${item.ema21.toFixed(4)})</span>`;
        }

        // Ana State Polling (Bot Verilerini Çekme)
        async function pollState() {
            try {
                const response = await fetch('/api/state');
                if (response.status === 404) return; // Dosya henüz yok
                const data = await response.json();
                botState = data;

                // Üst Bar Güncellemesi
                document.getElementById('last-update').textContent = `Son Güncelleme: ${new Date().toLocaleTimeString()}`;
                document.getElementById('balance').textContent = `${data.bakiye.toFixed(2)} USDT`;

                const pos = data.pozisyon;
                const posDiv = document.getElementById('position-info');
                if (pos.aktif) {
                    const color = pos.yon === 'AL' ? 'text-up' : 'text-down';
                    posDiv.innerHTML = `
                        <div class="flex justify-between w-full font-bold ${color}">
                            <span>${pos.sembol}</span>
                            <span>${pos.yon}</span>
                        </div>
                        <div class="flex justify-between w-full text-gray-300 mt-1">
                            <span>Giriş:</span>
                            <span>${pos.giris.toFixed(4)}</span>
                        </div>
                    `;
                } else {
                    posDiv.innerHTML = `<span class="text-gray-500">Açık Pozisyon Yok</span>`;
                }

                // Tarama Tablosunu Güncelleme
                const tbody = document.getElementById('scan-table');
                tbody.innerHTML = '';
                
                data.tarama.forEach(item => {
                    const row = document.createElement('tr');
                    const isActive = item.sembol === currentSymbol;
                    row.className = `cursor-pointer transition-colors ${isActive ? 'bg-gray-800' : 'hover:bg-gray-800/50'}`;
                    row.onclick = () => selectSymbol(item.sembol);

                    // Sinyal Rengi
                    let sigColor = 'text-gray-500';
                    if (item.sinyal === 'AL') sigColor = 'bg-up/20 text-up border border-up/30';
                    if (item.sinyal === 'SAT') sigColor = 'bg-down/20 text-down border border-down/30';

                    row.innerHTML = `
                        <td class="py-3 px-4 font-mono font-medium ${isActive ? 'text-white' : 'text-gray-300'}">${item.sembol}</td>
                        <td class="py-3 px-4 font-mono text-accent">${item.skor.toFixed(3)}</td>
                        <td class="py-3 px-4 text-right">
                            <span class="px-2 py-1 rounded text-xs font-bold ${item.sinyal !== 'BEKLE' ? sigColor : 'text-gray-600'}">
                                ${item.sinyal}
                            </span>
                        </td>
                        <td class="py-3 px-4 text-gray-500 text-xs">
                            K:${(item.stoch_k*100).toFixed(0)}% | ADX:${item.adx.toFixed(0)}
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                // İlk yüklemede indikatör panelini güncelle
                updateIndicatorPanel(currentSymbol);

            } catch (err) { console.error("API State hatası:", err); }
        }

        // Başlatma
        initChart();
        loadChartData(currentSymbol);
        pollState();
        
        // Döngüler (Grafik 10sn'de bir, Bot State 2sn'de bir güncellenir)
        setInterval(() => loadChartData(currentSymbol), 10000); 
        setInterval(pollState, 2000);
    </script>
</body>
</html>
